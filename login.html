<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login / Signup</title>

  <!-- Favicon  -->
  <link rel="icon" href="images/NuevoFavicon.png">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem 1rem;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 440px;
    }
    h2 {
      text-align: center;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 1rem;
    }
    input, select {
      width: 100%;
      padding: 0.6rem;
      margin-top: 0.3rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .btn {
      width: 100%;
      padding: 0.8rem;
      margin-top: 1rem;
      background-color: #20bcba;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .btn:hover { background-color: #199c9a; }
    .btn:disabled {
      background-color: #a0dedd;
      cursor: not-allowed;
    }
    .toggle-link {
      text-align: center;
      margin-top: 1rem;
      cursor: pointer;
      color: #20bcba;
      text-decoration: underline;
    }
    .error {
      color: red;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      text-align: center;
    }
    .checkbox-container {
      margin-top: 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .checkbox-container input[type="checkbox"] {
      width: auto;
      margin-top: 0.25rem;
      cursor: pointer;
    }
    .checkbox-container label {
      margin: 0;
      font-weight: normal;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .checkbox-container a {
      color: #20bcba;
      text-decoration: underline;
    }
    .checkbox-container a:hover { color: #199c9a; }

    /* Language tag styles */
    .lang-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.4rem;
      min-height: 0;
    }
    .lang-tag {
      background-color: #20bcba;
      color: white;
      border-radius: 15px;
      padding: 0.3rem 0.8rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.88rem;
    }
    .lang-tag .remove-tag {
      cursor: pointer;
      font-weight: bold;
      padding: 0 0.25rem;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      line-height: 1;
      font-size: 0.85rem;
    }
    .lang-tag .remove-tag:hover { background: rgba(255,255,255,0.5); }

    /* Become an instructor link (signup only) */
    .instructor-cta {
      display: none;
      text-align: center;
      margin-top: 0.9rem;
      padding-top: 0.9rem;
      border-top: 1px solid #eee;
      font-size: 0.85rem;
      color: #777;
    }
    .instructor-cta a {
      color: #20bcba;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }
    .instructor-cta a:hover { text-decoration: underline; color: #199c9a; }

    /* Auth-check overlay */
    #auth-check-overlay {
      position: fixed;
      inset: 0;
      background: #f4f4f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .check-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #20bcba;
      border-radius: 50%;
      animation: loginSpin 0.8s linear infinite;
      margin-bottom: 0.75rem;
    }
    @keyframes loginSpin { to { transform: rotate(360deg); } }

    @media (max-width: 500px) {
      .card { padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Shown while Firebase checks whether user is already signed in -->
  <div id="auth-check-overlay">
    <div class="check-spinner"></div>
    <div style="color:#666;font-size:0.95rem;">Checking session...</div>
  </div>

  <div class="card" id="login-card" style="display:none;">
    <h2 id="form-title">Sign In</h2>
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" />

    <div id="confirm-password-container" style="display: none;">
      <label>Confirm Password</label>
      <input type="password" id="confirm-password" placeholder="Re-enter password" autocomplete="new-password" />
    </div>

    <div id="name-container" style="display: none;">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your full name" autocomplete="name" />
    </div>

    <!-- Language sections (signup only) -->
    <div id="language-section" style="display: none;">
      <label id="spoken-label">I Speak</label>
      <select id="spokenLanguage">
        <option value="">Select a language to add...</option>
      </select>
      <div class="lang-tags" id="spoken-tags"></div>

      <label>I'm Learning</label>
      <select id="learningLanguage">
        <option value="">Select a language to add...</option>
      </select>
      <div class="lang-tags" id="learning-tags"></div>
    </div>

    <div id="age-checkbox-container" class="checkbox-container" style="display: none;">
      <input type="checkbox" id="age-checkbox" />
      <label for="age-checkbox">I confirm that I am 18 years old or older</label>
    </div>

    <div id="terms-checkbox-container" class="checkbox-container" style="display: none;">
      <input type="checkbox" id="terms-checkbox" />
      <label for="terms-checkbox">I agree to the <a href="terms-conditions" target="_blank">Terms and Conditions</a> and <a href="privacy-policy" target="_blank">Privacy Policy</a></label>
    </div>

    <button class="btn" id="submit-btn">Sign In</button>
    <div class="toggle-link" id="toggle-form">Don't have an account? Sign Up</div>
    <div class="instructor-cta" id="instructor-cta">
      Want to teach? <a href="become-an-instructor" target="_blank">Learn about becoming an instructor &rarr;</a>
    </div>
    <div class="error" id="error-message"></div>
  </div>

  <script type="module">
  import {
    auth,
    db,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    doc,
    getDoc,
    setDoc
  } from './lib/firebaseClient.js';

  // ── Safe storage helpers (localStorage throws in Safari Private Mode) ──────
  function safeGetStorage(key) {
    try { return localStorage.getItem(key); } catch(e) { return null; }
  }
  function safeSetStorage(key, val) {
    try { localStorage.setItem(key, val); } catch(e) {}
  }

  // ── Friendly error messages ───────────────────────────────────────────────
  function formatAuthError(msg) {
    if (!msg) return 'An error occurred. Please try again.';
    const m = msg.toLowerCase();
    if (m.includes('network-request-failed') || m.includes('unavailable') || m.includes('network error')) {
      return 'Network error — please check your connection and try again.';
    }
    if (m.includes('wrong-password') || m.includes('invalid-credential') || m.includes('invalid_login_credentials') || m.includes('invalid-login-credentials')) {
      return 'Incorrect email or password.';
    }
    if (m.includes('user-not-found')) {
      return 'No account found with this email.';
    }
    if (m.includes('too-many-requests')) {
      return 'Too many failed attempts. Please try again in a few minutes.';
    }
    if (m.includes('email-already-in-use')) {
      return 'An account with this email already exists.';
    }
    if (m.includes('weak-password')) {
      return 'Password must be at least 6 characters.';
    }
    return msg;
  }

  // ── Redirect helper ───────────────────────────────────────────────────────
  function redirectByRole(role) {
    if (role === 'instructor') window.location.href = '/dashboard';
    else if (role === 'student') window.location.href = '/student-dashboard';
  }

  // ── Check if already signed in — redirect immediately if so ───────────────
  const overlayEl   = document.getElementById('auth-check-overlay');
  const cardEl      = document.getElementById('login-card');

  // Safety net: no matter what happens, the login form appears within 5 seconds.
  // This prevents the spinner from hanging forever if authStateReady throws or
  // if Firebase takes too long to respond on a slow mobile connection.
  let formShown = false;
  function showLoginForm() {
    if (formShown) return;
    formShown = true;
    overlayEl.style.display = 'none';
    cardEl.style.display = 'block';
  }
  const safetyTimer = setTimeout(showLoginForm, 5000);

  // authStateReady() may not exist in all SDK/browser combinations and can
  // throw a synchronous TypeError before a .catch() is ever established.
  // Race against the safety timer so a hung IndexedDB never blocks the form.
  let readyPromise;
  try {
    const rawReady = (typeof auth.authStateReady === 'function')
      ? auth.authStateReady()
      : Promise.resolve();
    readyPromise = Promise.race([
      rawReady,
      new Promise(resolve => setTimeout(resolve, 5000))
    ]);
  } catch(e) {
    readyPromise = Promise.resolve();
  }

  readyPromise.then(async () => {
    if (auth.currentUser) {
      // Try Firestore for role; fall back to cache if offline
      let role = null;
      try {
        const snap = await getDoc(doc(db, 'users', auth.currentUser.uid));
        if (snap.exists()) {
          role = snap.data().role;
          if (role) safeSetStorage('user_role_cache', role);
        }
      } catch(e) {
        role = safeGetStorage('user_role_cache');
      }
      if (role === 'instructor' || role === 'student') {
        clearTimeout(safetyTimer);
        redirectByRole(role);
        return; // stay on redirect, don't show form
      }
    }
    // Not signed in (or role unknown) — show the login form
    clearTimeout(safetyTimer);
    showLoginForm();
  }).catch(() => {
    // authStateReady failed — show form anyway
    clearTimeout(safetyTimer);
    showLoginForm();
  });

  // ── Language list ─────────────────────────────────────────────────────────
  const languages = [
    "Afrikaans","Akan","Albanian","Amharic","Arabic","Armenian","Assamese","Aymara","Azerbaijani",
    "Bambara","Bangla","Basque","Belarusian","Bhojpuri","Bosnian","Bulgarian","Burmese",
    "Cantonese","Catalan","Cebuano","Central Kurdish","Chinese (Simplified)","Chinese (Traditional)","Corsican","Croatian","Czech",
    "Danish","Divehi","Dogri","Dutch",
    "English","Esperanto","Estonian","Ewe",
    "Filipino","Finnish","French",
    "Galician","Ganda","Georgian","German","Goan Konkani","Greek","Greenlandic","Guarani","Gujarati",
    "Haitian Creole","Hausa","Hawaiian","Hebrew","Hindi","Hmong","Hungarian",
    "Icelandic","Igbo","Iloko","Indonesian","Irish","Italian",
    "Japanese","Javanese",
    "Kannada","Kazakh","Khmer","Kinyarwanda","Klingon","Korean","Krio","Kurdish","Kyrgyz",
    "Lao","Latin","Latvian","Lingala","Lithuanian","Luxembourgish",
    "Macedonian","Maithili","Malagasy","Malay","Malayalam","Maltese","Manipuri (Meitei Mayek)","Māori","Marathi","Mizo","Mongolian",
    "Nahuatl","Nepali","Northern Sotho","Norwegian","Nyanja",
    "Odia","Oromo",
    "Papiamento","Pashto","Persian","Polish","Portuguese","Punjabi",
    "Quechua",
    "Romanian","Romansh","Russian",
    "Samoan","Sanskrit","Scottish Gaelic","Serbian","Shona","Silbo Gomero","Sindhi","Sinhala","Slovak","Slovenian","Somali","Southern Sotho","Spanish","Sundanese","Swahili","Swedish",
    "Tagalog","Tajik","Tamil","Tatar","Telugu","Thai","Tigrinya","Tok Pisin","Tsonga","Turkish","Turkmen","Twi",
    "Ukrainian","Urdu","Uyghur","Uzbek",
    "Vietnamese",
    "Welsh","Western Frisian","Wu Chinese",
    "Xhosa",
    "Yiddish","Yoruba","Yue Chinese",
    "Zulu"
  ];

  let isSignup = false;
  let spokenLangs = [];
  let learningLangs = [];

  const emailEl        = document.getElementById('email');
  const passwordEl     = document.getElementById('password');
  const confirmPwdEl   = document.getElementById('confirm-password');
  const submitBtn      = document.getElementById('submit-btn');
  const toggleLink     = document.getElementById('toggle-form');
  const formTitle      = document.getElementById('form-title');
  const confirmCont    = document.getElementById('confirm-password-container');
  const nameCont       = document.getElementById('name-container');
  const langSection    = document.getElementById('language-section');
  const ageCont        = document.getElementById('age-checkbox-container');
  const termsCont      = document.getElementById('terms-checkbox-container');
  const ageBox         = document.getElementById('age-checkbox');
  const termsBox       = document.getElementById('terms-checkbox');
  const errorEl        = document.getElementById('error-message');
  const spokenSel      = document.getElementById('spokenLanguage');
  const learningSel    = document.getElementById('learningLanguage');

  // Populate language dropdowns
  languages.forEach(lang => {
    [spokenSel, learningSel].forEach(sel => {
      const o = document.createElement('option');
      o.value = lang; o.textContent = lang;
      sel.appendChild(o);
    });
  });

  function renderTags(type) {
    const arr = type === 'spoken' ? spokenLangs : learningLangs;
    const container = document.getElementById(type === 'spoken' ? 'spoken-tags' : 'learning-tags');
    container.innerHTML = '';
    arr.forEach(lang => {
      const tag = document.createElement('span');
      tag.className = 'lang-tag';
      tag.innerHTML = `<span>${lang}</span><span class="remove-tag">×</span>`;
      tag.querySelector('.remove-tag').addEventListener('click', () => {
        if (type === 'spoken') spokenLangs = spokenLangs.filter(l => l !== lang);
        else learningLangs = learningLangs.filter(l => l !== lang);
        renderTags(type);
      });
      container.appendChild(tag);
    });
  }

  spokenSel.addEventListener('change', () => {
    const val = spokenSel.value;
    if (val && !spokenLangs.includes(val)) { spokenLangs.push(val); renderTags('spoken'); }
    spokenSel.value = '';
  });

  learningSel.addEventListener('change', () => {
    const val = learningSel.value;
    if (val && !learningLangs.includes(val)) { learningLangs.push(val); renderTags('learning'); }
    learningSel.value = '';
  });

  toggleLink.addEventListener('click', () => {
    isSignup = !isSignup;
    formTitle.textContent    = isSignup ? 'Sign Up' : 'Sign In';
    submitBtn.textContent    = isSignup ? 'Sign Up' : 'Sign In';
    toggleLink.textContent   = isSignup ? 'Already have an account? Sign In' : "Don't have an account? Sign Up";
    confirmCont.style.display  = isSignup ? 'block' : 'none';
    nameCont.style.display     = isSignup ? 'block' : 'none';
    langSection.style.display  = isSignup ? 'block' : 'none';
    ageCont.style.display      = isSignup ? 'flex'  : 'none';
    termsCont.style.display    = isSignup ? 'flex'  : 'none';
    document.getElementById('instructor-cta').style.display = isSignup ? 'block' : 'none';
    // Reset
    ageBox.checked = false; termsBox.checked = false;
    spokenLangs = []; learningLangs = [];
    renderTags('spoken'); renderTags('learning');
    document.getElementById('name').value = '';
    errorEl.textContent = '';
  });

  submitBtn.addEventListener('click', async () => {
    const email    = emailEl.value.trim();
    const password = passwordEl.value.trim();
    errorEl.textContent = '';

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      return;
    }

    // Disable button and show progress
    submitBtn.disabled = true;
    const origText = submitBtn.textContent;
    submitBtn.textContent = isSignup ? 'Creating account...' : 'Signing in...';

    try {
      if (isSignup) {
        const name            = document.getElementById('name').value.trim();
        const confirmPassword = confirmPwdEl.value.trim();

        if (!name)                    { throw new Error('Please enter your full name.'); }
        if (password !== confirmPassword) { throw new Error('Passwords do not match.'); }
        if (spokenLangs.length === 0)  { throw new Error('Please add at least one language you speak.'); }
        if (learningLangs.length === 0) { throw new Error("Please add at least one language you're learning."); }
        if (!ageBox.checked)   { throw new Error('You must confirm that you are 18 years old or older.'); }
        if (!termsBox.checked) { throw new Error('You must agree to the Terms and Conditions and Privacy Policy.'); }

        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCred.user;

        const userData = {
          email, role: 'student', name, emailNotifications: true,
          createdAt: new Date().toISOString(),
          languages_spoken: spokenLangs,
          languages_learning: learningLangs
        };
        await setDoc(doc(db, 'users', user.uid), userData);

        alert('Account created! Please sign in.');
        submitBtn.disabled = false;
        submitBtn.textContent = origText;
        toggleLink.click();

      } else {
        // ── Sign in ──────────────────────────────────────────────────────
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const user = userCred.user;

        // Determine role — try Firestore, fall back to local cache
        let role = null;
        try {
          const snap = await getDoc(doc(db, 'users', user.uid));
          if (snap.exists()) {
            role = snap.data().role;
            if (role) safeSetStorage('user_role_cache', role);
          }
        } catch(firestoreErr) {
          // Firestore unavailable (offline/slow mobile) — use cached role
          role = safeGetStorage('user_role_cache');
          if (!role) throw firestoreErr; // re-throw only if no cache available
        }

        if (role === 'instructor' || role === 'student') {
          redirectByRole(role);
          // Don't re-enable button — page is navigating away
        } else {
          errorEl.textContent = 'Profile not found. Please contact support.';
          submitBtn.disabled = false;
          submitBtn.textContent = origText;
        }
      }
    } catch(error) {
      errorEl.textContent = formatAuthError(error.message);
      submitBtn.disabled = false;
      submitBtn.textContent = origText;
    }
  });
  </script>

</body>
</html>
