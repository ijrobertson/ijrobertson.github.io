<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled – Lingua Bud</title>

  <link rel="icon" href="images/NuevoFavicon.png">
  <link href="https://fonts.googleapis.com/css?family=Montserrat:500,700&display=swap&subset=latin-ext" rel="stylesheet">
  <link href="css/bootstrap.css" rel="stylesheet">
  <link href="css/fontawesome-all.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #fef3c7;
      color: #f59e0b;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }
    h2 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.75rem; color: #113448; }
    p  { color: #555; font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .note {
      background: #f8f9fa;
      border-left: 4px solid #f59e0b;
      border-radius: 6px;
      padding: 0.9rem 1.1rem;
      font-size: 0.88rem;
      color: #666;
      text-align: left;
      margin-bottom: 1.5rem;
    }
    .btn-primary-custom {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #20bcba;
      color: #fff;
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .btn-primary-custom:hover { background: #199c9a; color: #fff; text-decoration: none; }
    .btn-secondary-custom {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.65rem 1.75rem;
      background: transparent;
      color: #20bcba;
      border: 2px solid #20bcba;
      border-radius: 6px;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .btn-secondary-custom:hover { background: #20bcba; color: #fff; text-decoration: none; }
    .logo { margin-bottom: 1rem; }
    .logo img { height: 36px; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <a href="index"><img src="images/NewLogo8.png" alt="Lingua Bud"></a>
  </div>

  <div class="icon-circle">
    <i class="fas fa-ban"></i>
  </div>

  <h2>Payment Not Completed</h2>
  <p>Your payment was cancelled and you have not been charged. No booking has been made.</p>

  <div class="note">
    <strong>Changed your mind?</strong> You can go back to the instructors page and try booking again at any time.
  </div>

  <a href="instructors" class="btn-primary-custom">Browse Instructors</a><br>
  <a href="index" class="btn-secondary-custom">Go to Home</a>
</div>

</body>
</html>
